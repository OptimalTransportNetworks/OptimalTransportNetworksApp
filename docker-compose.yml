services:
  app:
    build: .
    restart: unless-stopped
    environment:
      OTN_HSL_LIB: /data/lib/${OTN_HSL_LIB_FILE:-libhsl_subset.so}
    volumes:
      - ./hsl:/data/lib:ro
    expose:
      - "8080"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
