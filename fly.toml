# fly.toml app configuration file generated for optimaltransportnetworksapp on 2026-07-04T02:30:37Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'optimaltransportnetworksapp'
primary_region = 'ams'  # must match the machine's region: min_machines_running only applies in the primary region
swap_size_mb = 1024

[build]
  dockerfile = 'Dockerfile'

[env]
  OTN_HOST = '0.0.0.0'
  OTN_PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
